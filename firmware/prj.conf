# -----------------------
# Hardware Drivers
# -----------------------
# GPIO / PWM / SPI (and SPI's async/slave/DMA/reset deps) are pulled in by the
# APP_GPIO / APP_PWM / APP_SPI options in Kconfig. SERIAL stays here because the
# USB CDC ACM port and shell backend depend on it regardless of subsystems.
CONFIG_SERIAL=y

# -----------------------
# USB Device Stack
# -----------------------
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_INITIALIZE_AT_BOOT=n
CONFIG_USB_DEVICE_PRODUCT="Pix-in-the-Loop HIL Controller"
CONFIG_UART_LINE_CTRL=y

# -----------------------
# Shell Subsystem
# -----------------------
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_SHELL_BACKEND_SERIAL_INIT_PRIORITY=51
CONFIG_SHELL_PROMPT_UART="hil:~$ "

# -----------------------
# Console/Logging
# -----------------------
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y

